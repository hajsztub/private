[build]
  command       = "npm run build"
  publish       = "dist"
  ignore        = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':!*.md'"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.mp3"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0b0e1a"/>
  <!-- Card shape -->
  <rect x="80" y="60" width="352" height="400" rx="32" fill="#161b2e"/>
  <rect x="80" y="60" width="352" height="400" rx="32" fill="none" stroke="#00e676" stroke-width="6" opacity="0.6"/>
  <!-- Top accent bar -->
  <rect x="80" y="60" width="352" height="60" rx="32" fill="#00e676" opacity="0.15"/>
  <rect x="80" y="90" width="352" height="30" fill="#00e676" opacity="0.15"/>
  <!-- Silhouette body -->
  <ellipse cx="256" cy="360" rx="90" ry="60" fill="#1e2a4a"/>
  <rect x="220" y="290" width="72" height="80" rx="12" fill="#c68642" opacity="0.8"/>
  <!-- Head -->
  <ellipse cx="256" cy="250" rx="68" ry="76" fill="#c68642" opacity="0.85"/>
  <!-- Hair -->
  <ellipse cx="256" cy="190" rx="62" ry="38" fill="#1a1a1a" opacity="0.8"/>
  <!-- FC text -->
  <text x="256" y="470" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#00e676" text-anchor="middle" letter-spacing="4">FC</text>
  <!-- Ball -->
  <circle cx="420" cy="100" r="40" fill="#ffffff" opacity="0.1"/>
  <circle cx="420" cy="100" r="40" fill="none" stroke="#00e676" stroke-width="3" opacity="0.4"/>
  <text x="420" y="115" font-size="42" text-anchor="middle">⚽</text>
</svg>
